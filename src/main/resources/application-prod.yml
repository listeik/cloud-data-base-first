spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:false}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
    export:
      otlp:
        enabled: ${TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    resource-attributes:
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:production}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        environment: ${DEPLOYMENT_ENVIRONMENT:production}
    json:
      rename:
        traceId: trace.id
        spanId: span.id
      stacktrace:
        max-length: 8192

app:
  storage:
    endpoint: ${STORAGE_ENDPOINT}
    bucket: ${STORAGE_BUCKET:user-files}
    access-key: ${STORAGE_ACCESS_KEY}
    secret-key: ${STORAGE_SECRET_KEY}
    user-root-prefix-pattern: ${STORAGE_USER_ROOT_PREFIX_PATTERN:user-%d-files}
    user-quota: ${STORAGE_USER_QUOTA:10GB}
    max-file-size: ${STORAGE_MAX_FILE_SIZE:128MB}
